<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>The Cary Pub — The Bartender</title>
<style>
/* ============================================================
   THE CARY PUB — "THE BARTENDER" CHAT UI
   ============================================================ */
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700&family=Caveat:wght@400;600;700&family=Playfair+Display:wght@700;900&display=swap');
:root {
  --gold: #F59E0B;
  --gold-dark: #B45309;
  --gold-glow: rgba(245,158,11,0.15);
  --cream: #f0e6d3;
  --cream-dim: #bfb49e;
  --bg: #111010;
  --bg-chat: #1a1917;
  --bg-bubble-them: #2a2520;
  --bg-bubble-you: #3d3020;
  --border: rgba(255,255,255,0.06);
  --red: #DC2626;
  --green: #22c55e;
  --font-body: 'DM Sans', -apple-system, sans-serif;
  --font-hand: 'Caveat', cursive;
  --font-display: 'Playfair Display', Georgia, serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--cream);
  font-family: var(--font-body);
  display: flex; flex-direction: column;
  overflow: hidden;
}
a { color: var(--gold); text-decoration: none; }
a:hover { text-decoration: underline; }
/* ---- Scrollbar ---- */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(245,158,11,0.2); border-radius: 3px; }
/* ---- Animations ---- */
@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes popIn {
  0% { opacity: 0; transform: scale(0.85); }
  60% { transform: scale(1.03); }
  100% { opacity: 1; transform: scale(1); }
}
@keyframes blink {
  0%, 60%, 100% { opacity: 0.3; }
  30% { opacity: 1; }
}
@keyframes shake {
  0%, 100% { transform: rotate(0); }
  25% { transform: rotate(-3deg); }
  75% { transform: rotate(3deg); }
}
@keyframes gentleBob {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-3px); }
}
/* ============================================================
   HEADER BAR
   ============================================================ */
.header-bar {
  background: rgba(17,16,16,0.95);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
  display: flex; align-items: center; gap: 12px;
  flex-shrink: 0; z-index: 10;
}
.header-avatar {
  width: 42px; height: 42px; border-radius: 50%;
  background: linear-gradient(135deg, #5c3a1e, #8B6914);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
  box-shadow: 0 0 0 2px var(--gold-dark);
}
.header-info { flex: 1; }
.header-name {
  font-family: var(--font-display); font-weight: 900;
  font-size: 17px; color: var(--gold);
}
.header-status { font-size: 12px; color: var(--green); display: flex; align-items: center; gap: 4px; }
.header-status::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%;
  background: var(--green); display: inline-block;
}
.header-est {
  font-family: var(--font-hand); font-size: 14px;
  color: var(--cream-dim); letter-spacing: 1px;
}
/* ============================================================
   CHAT AREA
   ============================================================ */
.chat-area {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  padding: 20px 16px 8px;
  display: flex; flex-direction: column; gap: 6px;
  scroll-behavior: smooth;
}
/* ---- Message row ---- */
.msg-row {
  display: flex; gap: 10px; max-width: 85%;
  animation: slideUp 0.35s ease both;
}
.msg-row.them { align-self: flex-start; }
.msg-row.you { align-self: flex-end; flex-direction: row-reverse; }
.msg-avatar {
  width: 34px; height: 34px; border-radius: 50%;
  background: linear-gradient(135deg, #5c3a1e, #8B6914);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0; align-self: flex-end;
}
.msg-row.you .msg-avatar { display: none; }
.msg-bubble {
  padding: 12px 16px; border-radius: 18px;
  font-size: 15px; line-height: 1.55;
  max-width: 100%;
}
.msg-row.them .msg-bubble {
  background: var(--bg-bubble-them);
  border-bottom-left-radius: 4px;
  color: var(--cream);
}
.msg-row.you .msg-bubble {
  background: linear-gradient(135deg, rgba(245,158,11,0.2), rgba(245,158,11,0.08));
  border: 1px solid rgba(245,158,11,0.15);
  border-bottom-right-radius: 4px;
  color: var(--cream);
}
/* ---- Typing indicator ---- */
.typing-row { align-self: flex-start; display: flex; gap: 10px; }
.typing-dots {
  display: flex; gap: 4px; padding: 14px 20px;
  background: var(--bg-bubble-them); border-radius: 18px;
  border-bottom-left-radius: 4px;
}
.typing-dots span {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--cream-dim);
  animation: blink 1.4s ease infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
/* ---- Special content in messages ---- */
.msg-bubble h3 {
  font-family: var(--font-display); font-size: 17px;
  color: var(--gold); margin-bottom: 8px; font-weight: 900;
}
.msg-bubble .special-highlight {
  font-family: var(--font-hand); font-size: 22px;
  color: var(--gold); margin: 6px 0;
}
.msg-bubble .menu-line {
  display: flex; justify-content: space-between;
  padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
}
.msg-bubble .menu-line:last-child { border-bottom: none; }
.msg-bubble .menu-line .ml-info { flex: 1; margin-right: 12px; }
.msg-bubble .menu-line .ml-name { font-weight: 700; font-size: 14px; color: var(--cream); }
.msg-bubble .menu-line .ml-desc { font-size: 12px; color: var(--cream-dim); margin-top: 2px; }
.msg-bubble .menu-line .ml-price { font-weight: 700; color: var(--gold); font-size: 15px; white-space: nowrap; }
.msg-bubble .wing-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 6px; margin: 8px 0;
}
.msg-bubble .wing-chip {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px; padding: 8px 10px;
  font-size: 13px;
}
.msg-bubble .wing-chip .wc-name { font-weight: 700; color: var(--cream); }
.msg-bubble .wing-chip .wc-heat { font-size: 11px; color: var(--cream-dim); margin-top: 2px; }
.msg-bubble .wing-sizes {
  display: flex; gap: 8px; justify-content: center; margin: 10px 0 6px;
}
.msg-bubble .ws-card {
  text-align: center; background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px; padding: 10px 16px; min-width: 80px;
}
.msg-bubble .ws-card .ws-count { font-size: 22px; font-weight: 700; color: var(--cream); }
.msg-bubble .ws-card .ws-label { font-size: 11px; color: var(--cream-dim); }
.msg-bubble .ws-card .ws-price { font-size: 15px; font-weight: 700; color: var(--gold); margin-top: 2px; }
.msg-bubble .info-card-row {
  display: flex; gap: 10px; align-items: flex-start;
  padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
}
.msg-bubble .info-card-row:last-child { border-bottom: none; }
.msg-bubble .info-card-row .icr-icon { font-size: 20px; flex-shrink: 0; }
.msg-bubble .info-card-row .icr-title {
  font-size: 11px; font-weight: 700; color: var(--gold);
  text-transform: uppercase; letter-spacing: 0.5px;
}
.msg-bubble .info-card-row .icr-body { font-size: 14px; color: var(--cream-dim); line-height: 1.5; }
.msg-bubble .note {
  font-size: 12px; color: var(--cream-dim); font-style: italic;
  margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.04);
}
/* ============================================================
   QUICK REPLIES (bottom bar)
   ============================================================ */
.reply-bar {
  flex-shrink: 0;
  padding: 12px 16px 20px;
  border-top: 1px solid var(--border);
  background: rgba(17,16,16,0.95);
  backdrop-filter: blur(10px);
}
.reply-bar-inner {
  display: flex; flex-wrap: wrap; gap: 8px;
  justify-content: center;
  max-width: 700px; margin: 0 auto;
}
.quick-btn {
  border: none; border-radius: 20px;
  padding: 10px 18px; cursor: pointer;
  font-family: var(--font-body); font-size: 14px; font-weight: 500;
  transition: all 0.2s; white-space: nowrap;
  animation: popIn 0.3s ease both;
}
.quick-btn.primary {
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  color: #1a1a1a;
  box-shadow: 0 2px 12px rgba(245,158,11,0.25);
}
.quick-btn.primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 18px rgba(245,158,11,0.35);
}
.quick-btn.secondary {
  background: var(--bg-bubble-them);
  color: var(--cream);
  border: 1px solid rgba(255,255,255,0.08);
}
.quick-btn.secondary:hover {
  background: rgba(255,255,255,0.08);
  border-color: rgba(245,158,11,0.3);
}
.quick-btn.back {
  background: transparent;
  color: var(--cream-dim);
  border: 1px solid rgba(255,255,255,0.06);
  font-size: 13px;
}
.quick-btn.back:hover { color: var(--gold); border-color: rgba(245,158,11,0.2); }
/* stagger animation for buttons */
.quick-btn:nth-child(1) { animation-delay: 0s; }
.quick-btn:nth-child(2) { animation-delay: 0.06s; }
.quick-btn:nth-child(3) { animation-delay: 0.12s; }
.quick-btn:nth-child(4) { animation-delay: 0.18s; }
.quick-btn:nth-child(5) { animation-delay: 0.24s; }
.quick-btn:nth-child(6) { animation-delay: 0.3s; }
/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (min-width: 700px) {
  .chat-area { padding: 24px 10%; }
  .msg-row { max-width: 72%; }
}
@media (max-width: 400px) {
  .quick-btn { padding: 8px 14px; font-size: 13px; }
  .msg-bubble .wing-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="header-bar">
  <div class="header-avatar">🍺</div>
  <div class="header-info">
    <div class="header-name">The Cary Pub</div>
    <div class="header-status">Bar's open — ask me anything</div>
  </div>
  <div class="header-est">Est. 2013</div>
</div>
<div id="chat-area" class="chat-area"></div>
<div class="reply-bar">
  <div class="reply-bar-inner" id="reply-bar"></div>
</div>

<!-- Load shared site data -->
<script src="js/site-data.js"></script>

<script>
// ============================================================
// THE CARY PUB — BARTENDER CHAT ENGINE
// ============================================================
const DAYS = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const TODAY = DAYS[new Date().getDay()];
const chatArea = document.getElementById("chat-area");
const replyBar = document.getElementById("reply-bar");
let msgDelay = 0;
// ============================================================
// BARTENDER PERSONALITY — Edit these for different vibes!
// ============================================================
const GREETINGS = [
  `Hey there! 👋 Welcome to The Cary Pub. I'm your bartender today. What can I do for ya?`,
  `Well hey! Pull up a stool. 🍺 What are we getting into today?`,
  `Welcome in! You caught me polishing glasses. What sounds good?`,
];
const SPECIALS_INTROS = [
  `Alright, here's what we got cookin' for <strong>${TODAY}</strong>:`,
  `Good timing — check out today's <strong>${TODAY}</strong> deals:`,
  `${TODAY}'s looking real good around here:`,
];
const WING_INTROS = [
  `Oh, you came to the right place. Wings are kinda our thing. 🍗`,
  `NOW we're talking. Let me break down the wing situation for you:`,
  `Wings? Say less. Here's the lineup:`,
];
const MENU_INTROS = [
  `Everything's made in-house — that's the Cary Pub difference. What are you in the mood for?`,
  `Hungry? Good. Our kitchen doesn't mess around. Pick a category:`,
  `Let me grab you a menu. What section you wanna look at?`,
];
const MENU_CAT_INTROS = {
  appetizers: [`Here are the starters — great for sharing... or not. I don't judge. 😄`, `Appetizers coming right up:`],
  soupsAndSalads: [`Soups & Salads — for when you want to pretend you're being healthy at a pub:`, `Here's the lighter side of the menu:`],
  sandwiches: [`Sandwiches & wraps — all come with your choice of side:`, `Here's the sandwich lineup. All served with a side:`],
  burgers: [`Fresh burgers, cooked to order. These are the real deal: 🍔`, `Burger time. All come with a side of your choice:`],
};
const INFO_INTROS = [
  `Here's the rundown on finding us:`,
  `Come on down! Here's the info:`,
];
const ABOUT_LINES = [
  `Since <strong>2013</strong>, this has been Cary's go-to spot. No-frills, come-as-you-are, just good food and cold beer.`,
  `We got <strong>15 flat screens</strong> — NFL Sunday Ticket, weekly trivia, the works. Whether you're a regular or brand new, you're welcome here. 🍻`,
];
// ============================================================
// HELPERS
// ============================================================
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function scrollBottom() {
  setTimeout(() => { chatArea.scrollTop = chatArea.scrollHeight; }, 50);
}
function clearReplies() { replyBar.innerHTML = ''; }
function addUserMsg(text) {
  const row = document.createElement("div");
  row.className = "msg-row you";
  row.innerHTML = `<div class="msg-bubble">${text}</div>`;
  chatArea.appendChild(row);
  scrollBottom();
}
function showTyping() {
  const row = document.createElement("div");
  row.className = "typing-row";
  row.id = "typing";
  row.innerHTML = `
    <div class="msg-avatar">🍺</div>
    <div class="typing-dots"><span></span><span></span><span></span></div>
  `;
  chatArea.appendChild(row);
  scrollBottom();
}
function hideTyping() {
  const el = document.getElementById("typing");
  if (el) el.remove();
}
function addBartenderMsg(html, delay) {
  return new Promise(resolve => {
    setTimeout(() => {
      hideTyping();
      const row = document.createElement("div");
      row.className = "msg-row them";
      row.innerHTML = `
        <div class="msg-avatar">🍺</div>
        <div class="msg-bubble">${html}</div>
      `;
      chatArea.appendChild(row);
      scrollBottom();
      resolve();
    }, delay);
  });
}
async function bartenderSays(messages, thenFn) {
  clearReplies();
  showTyping();
  for (let i = 0; i < messages.length; i++) {
    const delay = i === 0 ? 800 : 600;
    if (i > 0) showTyping();
    await addBartenderMsg(messages[i], delay);
  }
  if (thenFn) setTimeout(thenFn, 200);
}
function setReplies(btns) {
  clearReplies();
  btns.forEach((b, i) => {
    const btn = document.createElement("button");
    btn.className = `quick-btn ${b.style || 'secondary'}`;
    btn.textContent = b.label;
    btn.style.animationDelay = `${i * 0.06}s`;
    btn.addEventListener("click", () => {
      if (b.userText !== false) addUserMsg(b.userText || b.label);
      b.action();
    });
    replyBar.appendChild(btn);
  });
}
// ============================================================
// SCREENS
// ============================================================
function showMainMenu() {
  setReplies([
    { label: "🔥 What's good today?", style: "primary", action: showSpecials },
    { label: "🍗 Wing me", style: "primary", action: showWings },
    { label: "🍔 Feed me", style: "secondary", action: showFoodMenu },
    { label: "📍 Where are you?", style: "secondary", action: showInfo },
    { label: "🍻 Tell me about the pub", style: "secondary", action: showAbout },
  ]);
}
// ---- SPECIALS ----
function showSpecials() {
  const special = DAILY_SPECIALS[TODAY];
  const drinksHtml = special.drinks.map(d => `🍺 ${d}`).join("<br>");
  bartenderSays([
    pick(SPECIALS_INTROS),
    `<h3>${special.emoji} ${TODAY} Specials</h3>
     <div class="special-highlight">🍽️ ${special.food}</div>
     <div style="margin-top:8px">${drinksHtml}</div>`,
    `Want me to show you anything else?`
  ], showMainMenu);
}
// ---- WINGS ----
function showWings() {
  const w = MENU_DATA.wings;
  const sizesHtml = w.sizes.map(s => `
    <div class="ws-card">
      <div class="ws-count">${s.count}</div>
      <div class="ws-label">wings</div>
      <div class="ws-price">$${s.price.toFixed(2)}</div>
    </div>
  `).join("");
  const flavorsHtml = w.flavors.map(f => {
    const flames = f.heat === 0 ? '❄️' : '🔥'.repeat(Math.min(f.heat, 5));
    return `<div class="wing-chip"><div class="wc-name">${f.name}</div><div class="wc-heat">${flames} ${f.label}</div></div>`;
  }).join("");
  bartenderSays([
    pick(WING_INTROS),
    `<h3>Pick Your Size</h3>
     <div class="wing-sizes">${sizesHtml}</div>`,
    `<h3>Pick Your Flavor</h3>
     <div class="wing-grid">${flavorsHtml}</div>
     <div class="note">Served with celery & ranch or blue cheese. Extra dressings +$0.50</div>`,
    `Anything else I can help with?`
  ], showMainMenu);
}
// ---- FOOD MENU ----
function showFoodMenu() {
  bartenderSays([
    pick(MENU_INTROS),
  ], () => {
    setReplies([
      { label: "🧀 Appetizers", style: "primary", action: () => showMenuCategory("appetizers") },
      { label: "🥗 Soups & Salads", style: "primary", action: () => showMenuCategory("soupsAndSalads") },
      { label: "🥪 Sandwiches", style: "secondary", action: () => showMenuCategory("sandwiches") },
      { label: "🍔 Burgers", style: "secondary", action: () => showMenuCategory("burgers") },
      { label: "← Back", style: "back", userText: false, action: () => { bartenderSays(["No worries! What else?"], showMainMenu); } },
    ]);
  });
}
function showMenuCategory(cat) {
  const items = MENU_DATA[cat];
  const labels = { appetizers: "Appetizers", soupsAndSalads: "Soups & Salads", sandwiches: "Sandwiches", burgers: "Burgers" };
  const intro = pick(MENU_CAT_INTROS[cat]);
  let menuHtml = `<h3>${labels[cat]}</h3>`;
  menuHtml += items.map(item => `
    <div class="menu-line">
      <div class="ml-info">
        <div class="ml-name">${item.name}</div>
        <div class="ml-desc">${item.desc}</div>
      </div>
      <div class="ml-price">$${item.price.toFixed(2)}</div>
    </div>
  `).join("");
  // Add-ons / sides
  if (cat === "soupsAndSalads") {
    menuHtml += `<div class="note">${MENU_DATA.saladAddOns}</div>`;
  }
  if (cat === "sandwiches" || cat === "burgers") {
    menuHtml += `<div class="note"><strong>Comes with:</strong> ${MENU_DATA.sidesIncluded}<br><strong>Upgrade (+$${MENU_DATA.sidesUpcharge.toFixed(2)}):</strong> ${MENU_DATA.sidesPremium}</div>`;
  }
  bartenderSays([
    intro,
    menuHtml,
    `Want to see another section or something else?`
  ], () => {
    setReplies([
      { label: "🧀 Appetizers", style: cat === "appetizers" ? "back" : "secondary", action: () => showMenuCategory("appetizers") },
      { label: "🥗 Soups & Salads", style: cat === "soupsAndSalads" ? "back" : "secondary", action: () => showMenuCategory("soupsAndSalads") },
      { label: "🥪 Sandwiches", style: cat === "sandwiches" ? "back" : "secondary", action: () => showMenuCategory("sandwiches") },
      { label: "🍔 Burgers", style: cat === "burgers" ? "back" : "secondary", action: () => showMenuCategory("burgers") },
      { label: "← Main menu", style: "back", userText: false, action: () => { bartenderSays(["You got it! What else?"], showMainMenu); } },
    ]);
  });
}
// ---- INFO ----
function showInfo() {
  const hoursHtml = PUB_INFO.hours.map(h => `<div>${h.days}: ${h.time}</div>`).join("");
  const infoHtml = `
    <div class="info-card-row">
      <div class="icr-icon">📍</div>
      <div><div class="icr-title">Location</div><div class="icr-body">${PUB_INFO.address}<br>${PUB_INFO.city}</div></div>
    </div>
    <div class="info-card-row">
      <div class="icr-icon">📞</div>
      <div><div class="icr-title">Phone</div><div class="icr-body"><a href="${PUB_INFO.phoneHref}" style="color:var(--cream)">${PUB_INFO.phone}</a></div></div>
    </div>
    <div class="info-card-row">
      <div class="icr-icon">🕐</div>
      <div><div class="icr-title">Hours</div><div class="icr-body">${hoursHtml}</div></div>
    </div>
    <div class="info-card-row">
      <div class="icr-icon">📱</div>
      <div><div class="icr-title">Follow Us</div><div class="icr-body">Facebook — <a href="${PUB_INFO.facebookUrl}" target="_blank">${PUB_INFO.facebook}</a></div></div>
    </div>
  `;
  bartenderSays([
    pick(INFO_INTROS),
    infoHtml,
    `We'd love to see you! Anything else?`
  ], showMainMenu);
}
// ---- ABOUT ----
function showAbout() {
  bartenderSays([
    ABOUT_LINES[0],
    ABOUT_LINES[1],
    `Anything else I can help with?`
  ], showMainMenu);
}
// ============================================================
// BOOT — Initial greeting
// ============================================================
window.addEventListener("DOMContentLoaded", () => {
  const todaySpecial = DAILY_SPECIALS[TODAY];
  bartenderSays([
    pick(GREETINGS),
    `By the way — it's <strong>${TODAY}</strong>, which means: <strong>${todaySpecial.food}</strong> ${todaySpecial.emoji}`,
  ], showMainMenu);
});
</script>
</body>
</html>
